name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          # Delete package-lock to avoid platform-specific optional dependency mismatch
          rm -f package-lock.json
          npm install --legacy-peer-deps --include=optional

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor Assets
        run: npx cap sync android

      - name: Verify Capacitor Assets Exist
        run: |
          echo "Verifying Capacitor assets in Android project..."
          if [ ! -f "android/app/src/main/assets/public/index.html" ]; then
            echo "::error::Capacitor assets are missing! index.html was not found in 'android/app/src/main/assets/public'. Please check if 'npm run build' and 'npx cap sync' succeeded."
            exit 1
          fi
          echo "Capacitor assets successfully verified."

      - name: Build Android App (APK & AAB for Google Play)
        run: |
          cd android
          chmod +x gradlew
          echo "Starting assembleDebug (APK)..."
          ./gradlew assembleDebug --stacktrace -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" --no-daemon
          echo "Starting bundleRelease (AAB)..."
          ./gradlew bundleRelease --stacktrace -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" --no-daemon

      - name: Upload Debug APK (For Testing)
        uses: actions/upload-artifact@v4
        with:
          name: souq-iraq-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB (For Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: souq-iraq-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
